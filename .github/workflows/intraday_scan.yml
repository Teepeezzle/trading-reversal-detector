name: Intraday Reversal Scan (4h)

# Runs the 4h reversal scanner four times per weekday at the key session
# transitions: London open (07:00 UTC), London/NY overlap (11:00 UTC),
# NY mid-session (15:00 UTC), and NY close (19:00 UTC).
# `workflow_dispatch` also exposes a manual "Run workflow" button.
on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "0 19 * * 1-5"
  workflow_dispatch:

jobs:
  intraday-scan:
    name: Scan all tickers on the 4h interval and email any signals
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 4h reversal scan and send email alert
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          PYTHONIOENCODING: "utf-8"
        run: python main.py --scan-all --interval 4h --session all --email

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intraday-scan-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 14
