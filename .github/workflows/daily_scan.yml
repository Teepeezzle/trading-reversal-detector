name: Daily Reversal Scan

# Runs the reversal scanner every weekday at 17:00 UTC (US market close).
# `workflow_dispatch` also exposes a manual "Run workflow" button in the UI.
on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    name: Scan all tickers and email any reversal signals
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run reversal scan and send email alert
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          PYTHONIOENCODING: "utf-8"
        run: python main.py --scan-all --email

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 14
