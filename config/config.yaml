# Trading Reversal Detector configuration

account_balance: 10000
risk_per_trade_pct: 2.0

# ───────────────────────────────────────────────────────────────────────
# VALIDATED DAILY BREAKOUT STRATEGY (the one edge that passed every test:
# out-of-sample, walk-forward, and 26-year portfolio — see backtest/).
# Used by breakout_scan.py. Long-only, daily timeframe. Parameters are FIXED
# and deliberately not tunable — re-optimizing reintroduces curve-fit.
# ───────────────────────────────────────────────────────────────────────
breakout:
  account_balance: 10000
  risk_per_trade_pct: 1.0          # validated at 1%; scale only after paper-trading
  max_concurrent_positions: 6
  # 18-market basket — each individually validated positive (expR >= 0.10) on
  # full daily history (see backtest/expand_validate.py). Dropped candidates
  # that failed: XRP, USD/JPY, AUD/USD, USD/CAD, Russell2000, and zero-edge
  # EUR/USD, S&P500, Corn.
  basket:
    - "BTC-USD"
    - "ETH-USD"
    - "SOL-USD"
    - "BNB-USD"
    - "LTC-USD"
    - "GBPUSD=X"
    - "GC=F"
    - "SI=F"
    - "PL=F"
    - "HG=F"
    - "CL=F"
    - "BZ=F"
    - "NG=F"
    - "RB=F"
    - "NQ=F"
    - "YM=F"
    - "ZW=F"
    - "ZS=F"
  basket_names:
    "BTC-USD": "Bitcoin"
    "ETH-USD": "Ethereum"
    "SOL-USD": "Solana"
    "BNB-USD": "BNB"
    "LTC-USD": "Litecoin"
    "GBPUSD=X": "GBP/USD"
    "GC=F": "Gold"
    "SI=F": "Silver"
    "PL=F": "Platinum"
    "HG=F": "Copper"
    "CL=F": "WTI Crude Oil"
    "BZ=F": "Brent Crude Oil"
    "NG=F": "Natural Gas"
    "RB=F": "Gasoline"
    "NQ=F": "Nasdaq 100"
    "YM=F": "Dow Jones"
    "ZW=F": "Wheat"
    "ZS=F": "Soybeans"

# ───────────────────────────────────────────────────────────────────────
# OVERNIGHT METALS DRIFT (separate short-hold edge — long Gold & Silver at the
# daily close, exit at the next open). Documented "night effect"; validated
# net-of-cost and out-of-sample (see backtest/expand_validate.py). Only Gold
# and Silver qualified — Platinum/Copper were negative. Used by overnight_scan.py.
# ───────────────────────────────────────────────────────────────────────
overnight:
  account_balance: 10000
  risk_per_trade_pct: 1.0
  markets:
    - "GC=F"
    - "SI=F"
  market_names:
    "GC=F": "Gold"
    "SI=F": "Silver"

max_daily_loss_pct: 6.0
max_concurrent_positions: 8
max_positions_per_class: 3
cache_duration_seconds: 300

# Tolerance used when checking if a candle touched a level (fraction, 0.001 = 0.1%)
extreme_touch_tolerance: 0.001

# Swing-point lookback window (candles either side) used for divergence detection
swing_lookback: 5

# Tickers grouped by asset class.
# This block drives the DAILY scan (--interval 1d) and the per-class risk cap.
tickers:
  forex:   ["EURUSD=X", "GBPUSD=X", "USDJPY=X", "AUDUSD=X", "USDCAD=X", "NZDUSD=X", "USDCHF=X"]
  metals:  ["GC=F", "SI=F"]
  oil:     ["CL=F", "BZ=F"]
  crypto:  ["BTC-USD", "ETH-USD"]

# Smaller, focused list used when --interval is anything other than 1d
# (15m / 30m / 1h / 4h). When this block is absent the intraday scan falls back
# to the full `tickers` list above.
intraday_tickers:
  crypto:  ["BTC-USD"]
  metals:  ["GC=F", "SI=F"]
  oil:     ["CL=F", "BZ=F"]
  indices: ["DX-Y.NYB", "NQ=F"]

# Human-readable display names (covers both ticker blocks)
ticker_names:
  "EURUSD=X": "EUR/USD"
  "GBPUSD=X": "GBP/USD"
  "USDJPY=X": "USD/JPY"
  "AUDUSD=X": "AUD/USD"
  "USDCAD=X": "USD/CAD"
  "NZDUSD=X": "NZD/USD"
  "USDCHF=X": "USD/CHF"
  "GC=F": "Gold"
  "SI=F": "Silver"
  "CL=F": "WTI Crude Oil"
  "BZ=F": "Brent Crude Oil"
  "BTC-USD": "Bitcoin"
  "ETH-USD": "Ethereum"
  "DX-Y.NYB": "US Dollar Index"
  "NQ=F": "Nasdaq 100"
